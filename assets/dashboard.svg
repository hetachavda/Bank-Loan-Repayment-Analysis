<svg width="1200" height="980" viewBox="0 0 1200 980" xmlns="http://www.w3.org/2000/svg"
     font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="head" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#184f95"/>
      <stop offset="100%" stop-color="#2a78d6"/>
    </linearGradient>
  </defs>

  <!-- page -->
  <rect width="1200" height="980" fill="#f9f9f7"/>

  <!-- ===== HEADER ===== -->
  <rect x="0" y="0" width="1200" height="86" fill="url(#head)"/>
  <text x="30" y="42" font-size="26" font-weight="700" fill="#ffffff">Bank Loan Default — Model Performance Dashboard</text>
  <text x="30" y="70" font-size="15" fill="#cde2fb">Logistic Regression · 37,138 loan applications · Python / scikit-learn</text>

  <!-- ===== KPI TILES ===== -->
  <!-- Tile 1 -->
  <rect x="30" y="110" width="360" height="120" rx="10" fill="#ffffff" stroke="rgba(11,11,11,0.10)"/>
  <rect x="30" y="110" width="6" height="120" rx="3" fill="#0ca30c"/>
  <text x="58" y="150" font-size="14" font-weight="600" fill="#898781" letter-spacing="1">ROC-AUC SCORE</text>
  <text x="56" y="205" font-size="52" font-weight="700" fill="#0b0b0b">0.915</text>
  <text x="270" y="205" font-size="14" fill="#006300">▲ strong</text>

  <!-- Tile 2 -->
  <rect x="420" y="110" width="360" height="120" rx="10" fill="#ffffff" stroke="rgba(11,11,11,0.10)"/>
  <rect x="420" y="110" width="6" height="120" rx="3" fill="#2a78d6"/>
  <text x="448" y="150" font-size="14" font-weight="600" fill="#898781" letter-spacing="1">LOANS ANALYZED</text>
  <text x="446" y="205" font-size="52" font-weight="700" fill="#0b0b0b">37,138</text>

  <!-- Tile 3 -->
  <rect x="810" y="110" width="360" height="120" rx="10" fill="#ffffff" stroke="rgba(11,11,11,0.10)"/>
  <rect x="810" y="110" width="6" height="120" rx="3" fill="#eda100"/>
  <text x="838" y="150" font-size="14" font-weight="600" fill="#898781" letter-spacing="1">DEFAULTS CAUGHT (RECALL)</text>
  <text x="836" y="205" font-size="52" font-weight="700" fill="#0b0b0b">62%</text>
  <text x="990" y="205" font-size="14" fill="#52514e">768 / 1,245</text>

  <!-- ===== ROC CURVE PANEL ===== -->
  <rect x="30" y="260" width="555" height="300" rx="10" fill="#ffffff" stroke="rgba(11,11,11,0.10)"/>
  <circle cx="48" cy="292" r="5" fill="#2a78d6"/>
  <text x="62" y="297" font-size="16" font-weight="700" fill="#0b0b0b">ROC Curve — Discriminative Power</text>

  <!-- axes -->
  <line x1="90" y1="520" x2="560" y2="520" stroke="#c3c2b7" stroke-width="1.5"/>
  <line x1="90" y1="520" x2="90" y2="310" stroke="#c3c2b7" stroke-width="1.5"/>
  <!-- gridlines -->
  <g stroke="#e1e0d9" stroke-width="1">
    <line x1="90" y1="467" x2="560" y2="467"/>
    <line x1="90" y1="415" x2="560" y2="415"/>
    <line x1="90" y1="362" x2="560" y2="362"/>
  </g>
  <text x="82" y="524" font-size="11" fill="#898781" text-anchor="end">0</text>
  <text x="82" y="315" font-size="11" fill="#898781" text-anchor="end">1</text>
  <text x="325" y="545" font-size="12" fill="#52514e" text-anchor="middle">False Positive Rate</text>
  <text x="60" y="415" font-size="12" fill="#52514e" text-anchor="middle" transform="rotate(-90 60 415)">True Positive Rate</text>

  <!-- diagonal reference -->
  <line x1="90" y1="520" x2="560" y2="310" stroke="#898781" stroke-width="1.5" stroke-dasharray="5 5"/>
  <text x="500" y="360" font-size="11" fill="#898781">random</text>

  <!-- ROC area fill -->
  <path d="M90,520 L113,404 L137,369 L184,341 L278,325 L372,316 L560,310 L560,520 Z"
        fill="#2a78d6" opacity="0.12"/>
  <!-- ROC curve -->
  <polyline points="90,520 113,404 137,369 184,341 278,325 372,316 560,310"
        fill="none" stroke="#2a78d6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- AUC callout -->
  <rect x="360" y="440" width="180" height="52" rx="8" fill="#2a78d6"/>
  <text x="450" y="465" font-size="13" fill="#cde2fb" text-anchor="middle">Area Under Curve</text>
  <text x="450" y="485" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">AUC = 0.915</text>

  <!-- ===== CONFUSION MATRIX PANEL ===== -->
  <rect x="615" y="260" width="555" height="300" rx="10" fill="#ffffff" stroke="rgba(11,11,11,0.10)"/>
  <circle cx="633" cy="292" r="5" fill="#1baf7a"/>
  <text x="647" y="297" font-size="16" font-weight="700" fill="#0b0b0b">Confusion Matrix — Test Set (7,428)</text>

  <text x="847" y="335" font-size="12" font-weight="600" fill="#52514e" text-anchor="middle">PREDICTED</text>
  <text x="775" y="360" font-size="12" fill="#898781" text-anchor="middle">Repaid</text>
  <text x="925" y="360" font-size="12" fill="#898781" text-anchor="middle">Default</text>
  <text x="682" y="425" font-size="12" font-weight="600" fill="#52514e" text-anchor="middle" transform="rotate(-90 682 460)">ACTUAL</text>
  <text x="705" y="425" font-size="12" fill="#898781" text-anchor="middle" transform="rotate(-90 705 425)">Repaid</text>
  <text x="705" y="525" font-size="12" fill="#898781" text-anchor="middle" transform="rotate(-90 705 525)">Default</text>

  <!-- cells: TP (correct) -->
  <rect x="720" y="375" width="150" height="100" rx="6" fill="#1baf7a"/>
  <text x="795" y="418" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle">3,922</text>
  <text x="795" y="440" font-size="11" fill="#e6f7ef" text-anchor="middle">True Repaid ✓</text>
  <!-- FN (error) -->
  <rect x="875" y="375" width="150" height="100" rx="6" fill="#f6cbb9"/>
  <text x="950" y="418" font-size="24" font-weight="700" fill="#0b0b0b" text-anchor="middle">2,261</text>
  <text x="950" y="440" font-size="11" fill="#52514e" text-anchor="middle">Missed default</text>
  <!-- FP (error) -->
  <rect x="720" y="480" width="150" height="100" rx="6" fill="#f6cbb9"/>
  <text x="795" y="523" font-size="24" font-weight="700" fill="#0b0b0b" text-anchor="middle">477</text>
  <text x="795" y="545" font-size="11" fill="#52514e" text-anchor="middle">False alarm</text>
  <!-- TN (correct) -->
  <rect x="875" y="480" width="150" height="100" rx="6" fill="#1baf7a"/>
  <text x="950" y="523" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle">768</text>
  <text x="950" y="545" font-size="11" fill="#e6f7ef" text-anchor="middle">True Default ✓</text>

  <!-- legend -->
  <rect x="1050" y="400" width="14" height="14" rx="3" fill="#1baf7a"/>
  <text x="1070" y="412" font-size="12" fill="#52514e">Correct</text>
  <rect x="1050" y="430" width="14" height="14" rx="3" fill="#f6cbb9"/>
  <text x="1070" y="442" font-size="12" fill="#52514e">Error</text>

  <!-- ===== FEATURE IMPORTANCE PANEL ===== -->
  <rect x="30" y="590" width="700" height="320" rx="10" fill="#ffffff" stroke="rgba(11,11,11,0.10)"/>
  <circle cx="48" cy="622" r="5" fill="#e34948"/>
  <text x="62" y="627" font-size="16" font-weight="700" fill="#0b0b0b">What Drives Default? — Feature Influence</text>
  <text x="62" y="648" font-size="12" fill="#898781">Bars right = raises default risk · left = protective</text>

  <!-- center axis -->
  <line x1="430" y1="675" x2="430" y2="880" stroke="#c3c2b7" stroke-width="1.5"/>

  <!-- Interest Rate -->
  <text x="55" y="702" font-size="13" fill="#0b0b0b">Interest Rate</text>
  <rect x="430" y="688" width="247" height="26" rx="4" fill="#e34948"/>
  <text x="685" y="705" font-size="12" font-weight="600" fill="#e34948">+0.95</text>
  <!-- DTI -->
  <text x="55" y="747" font-size="13" fill="#0b0b0b">Debt-to-Income</text>
  <rect x="430" y="733" width="143" height="26" rx="4" fill="#e34948" opacity="0.75"/>
  <text x="581" y="750" font-size="12" font-weight="600" fill="#e34948">+0.55</text>
  <!-- Employment Length -->
  <text x="55" y="792" font-size="13" fill="#0b0b0b">Employment Length</text>
  <rect x="430" y="778" width="104" height="26" rx="4" fill="#e34948" opacity="0.6"/>
  <text x="542" y="795" font-size="12" font-weight="600" fill="#e34948">+0.40</text>
  <!-- Annual Income (protective) -->
  <text x="55" y="837" font-size="13" fill="#0b0b0b">Annual Income</text>
  <rect x="391" y="823" width="39" height="26" rx="4" fill="#2a78d6"/>
  <text x="345" y="840" font-size="12" font-weight="600" fill="#2a78d6" text-anchor="end">−0.15</text>

  <text x="430" y="898" font-size="11" fill="#898781" text-anchor="middle">Logistic Regression standardized coefficients</text>

  <!-- ===== CLASS DISTRIBUTION DONUT PANEL ===== -->
  <rect x="760" y="590" width="410" height="320" rx="10" fill="#ffffff" stroke="rgba(11,11,11,0.10)"/>
  <circle cx="778" cy="622" r="5" fill="#eda100"/>
  <text x="792" y="627" font-size="16" font-weight="700" fill="#0b0b0b">Loan Outcome Distribution</text>

  <!-- donut (stroke-dasharray segments), rotated so it starts at top -->
  <g transform="rotate(-90 890 760)">
    <circle cx="890" cy="760" r="64" fill="none" stroke="#e1e0d9" stroke-width="34"/>
    <circle cx="890" cy="760" r="64" fill="none" stroke="#1baf7a" stroke-width="34"
            stroke-dasharray="333.8 402.1" stroke-dashoffset="0"/>
    <circle cx="890" cy="760" r="64" fill="none" stroke="#e34948" stroke-width="34"
            stroke-dasharray="56.3 402.1" stroke-dashoffset="-333.8"/>
    <circle cx="890" cy="760" r="64" fill="none" stroke="#eda100" stroke-width="34"
            stroke-dasharray="12.1 402.1" stroke-dashoffset="-390.1"/>
  </g>
  <text x="890" y="756" font-size="22" font-weight="700" fill="#0b0b0b" text-anchor="middle">37,138</text>
  <text x="890" y="776" font-size="12" fill="#898781" text-anchor="middle">total loans</text>

  <!-- donut legend -->
  <rect x="990" y="700" width="14" height="14" rx="3" fill="#1baf7a"/>
  <text x="1010" y="712" font-size="13" fill="#0b0b0b">Fully Paid</text>
  <text x="1150" y="712" font-size="13" font-weight="700" fill="#52514e" text-anchor="end">83%</text>

  <rect x="990" y="735" width="14" height="14" rx="3" fill="#e34948"/>
  <text x="1010" y="747" font-size="13" fill="#0b0b0b">Charged Off</text>
  <text x="1150" y="747" font-size="13" font-weight="700" fill="#52514e" text-anchor="end">14%</text>

  <rect x="990" y="770" width="14" height="14" rx="3" fill="#eda100"/>
  <text x="1010" y="782" font-size="13" fill="#0b0b0b">Current</text>
  <text x="1150" y="782" font-size="13" font-weight="700" fill="#52514e" text-anchor="end">3%</text>

  <!-- ===== FOOTER ===== -->
  <text x="30" y="955" font-size="12" fill="#898781">Heta Chavda · Data Analytics Portfolio · github.com/hetachavda</text>
</svg>
