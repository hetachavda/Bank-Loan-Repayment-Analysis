<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2027"/>
      <stop offset="50%" stop-color="#203a43"/>
      <stop offset="100%" stop-color="#2c5364"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00c6ff"/>
      <stop offset="100%" stop-color="#0072ff"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <g stroke="#3a5a68" stroke-width="1" opacity="0.25">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
  </g>

  <!-- animated prediction line (draws in, then gently bobs) -->
  <g filter="url(#glow)">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -6; 0 0" dur="4s" repeatCount="indefinite"/>
      <polyline points="760,250 830,220 890,235 950,175 1010,190 1070,120 1130,140"
        fill="none" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"
        stroke-dasharray="470" stroke-dashoffset="470">
        <animate attributeName="stroke-dashoffset" from="470" to="0" begin="0.3s" dur="1.8s" fill="freeze"/>
      </polyline>
      <g fill="#00c6ff">
        <circle cx="760" cy="250" r="5"><animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="0s" repeatCount="indefinite"/></circle>
        <circle cx="830" cy="220" r="5"><animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="0.3s" repeatCount="indefinite"/></circle>
        <circle cx="890" cy="235" r="5"><animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="0.6s" repeatCount="indefinite"/></circle>
        <circle cx="950" cy="175" r="5"><animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="0.9s" repeatCount="indefinite"/></circle>
        <circle cx="1010" cy="190" r="5"><animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="1.2s" repeatCount="indefinite"/></circle>
        <circle cx="1070" cy="120" r="5"><animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="1.5s" repeatCount="indefinite"/></circle>
        <circle cx="1130" cy="140" r="5"><animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="1.8s" repeatCount="indefinite"/></circle>
      </g>
    </g>
  </g>

  <rect x="70" y="96" width="8" height="128" rx="4" fill="url(#accent)"/>
  <text x="105" y="130" font-size="46" font-weight="700" fill="#ffffff">Bank Loan Repayment Analysis</text>
  <text x="105" y="176" font-size="24" font-weight="400" fill="#9fd8ef">Predicting Loan Defaults with Machine Learning</text>

  <g font-size="16" font-weight="600">
    <rect x="105" y="205" width="150" height="34" rx="17" fill="#0072ff" opacity="0.85"/>
    <text x="180" y="228" fill="#ffffff" text-anchor="middle">ROC-AUC 0.915</text>
    <rect x="267" y="205" width="180" height="34" rx="17" fill="#ffffff" opacity="0.12"/>
    <text x="357" y="228" fill="#cfeefc" text-anchor="middle">Logistic Regression</text>
    <rect x="459" y="205" width="150" height="34" rx="17" fill="#ffffff" opacity="0.12"/>
    <text x="534" y="228" fill="#cfeefc" text-anchor="middle">37K Loan Records</text>
  </g>

  <text x="105" y="285" font-size="15" fill="#7fa9bd">Python · scikit-learn · Pandas   |   Heta Chavda — Data Analytics Portfolio</text>

  <!-- shimmer sweep -->
  <rect x="-260" y="0" width="260" height="320" fill="url(#shine)" transform="skewX(-20)">
    <animate attributeName="x" from="-260" to="1300" dur="4.5s" begin="1s" repeatCount="indefinite"/>
  </rect>
</svg>
